<!DOCTYPE html>
<html>
<head>
  <title>Send Package</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    h2 {
      color: #2c3e50;
      margin-bottom: 40px;
      font-size: 2.2em;
      font-weight: 700;
      text-align: center;
      position: relative;
      padding-bottom: 20px;
    }
    
    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #4a90e2, #7b68ee);
      border-radius: 2px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #34495e;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid #e0e6ed;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: #fafbfc;
      color: #2c3e50;
    }
    
    input:focus {
      outline: none;
      border-color: #4a90e2;
      background: white;
      box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
      transform: translateY(-1px);
    }
    
    input::placeholder {
      color: #8492a6;
      font-style: italic;
    }
    
    button {
      background: linear-gradient(135deg, #4a90e2 0%, #7b68ee 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      margin-top: 25px;
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.25);
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s;
    }
    
    button:hover::before {
      left: 100%;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(74, 144, 226, 0.35);
    }
    
    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(74, 144, 226, 0.25);
    }
    
    .location-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .section-title {
      color: #34495e;
      font-size: 1.2em;
      font-weight: 600;
      margin: 30px 0 15px 0;
      display: flex;
      align-items: center;
    }
    
    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, #4a90e2, #7b68ee);
      margin-right: 12px;
      border-radius: 2px;
    }
    
    .icon {
      display: inline-block;
      margin-right: 8px;
      font-size: 1.2em;
    }
    
    .success-message {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      color: #155724;
      padding: 18px 20px;
      border-radius: 12px;
      border-left: 4px solid #28a745;
      margin-top: 20px;
      display: none;
      box-shadow: 0 2px 10px rgba(40, 167, 69, 0.1);
      font-weight: 500;
    }
    
    .error-message {
      background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
      color: #721c24;
      padding: 18px 20px;
      border-radius: 12px;
      border-left: 4px solid #dc3545;
      margin-top: 20px;
      display: none;
      box-shadow: 0 2px 10px rgba(220, 53, 69, 0.1);
      font-weight: 500;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 30px 25px;
        margin: 10px;
      }
      
      h2 {
        font-size: 1.8em;
      }
      
      .location-group {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      
      button {
        padding: 16px 30px;
        font-size: 15px;
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .container {
      animation: fadeIn 0.8s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📦 Send Package</h2>
    <div class="location-group">
      <div class="form-group">
        <input id="pickupLat" placeholder="Pickup Latitude">
      </div>
      <div class="form-group">
        <input id="pickupLng" placeholder="Pickup Longitude">
      </div>
    </div>
    <div class="location-group">
      <div class="form-group">
        <input id="dropLat" placeholder="Drop Latitude">
      </div>
      <div class="form-group">
        <input id="dropLng" placeholder="Drop Longitude">
      </div>
    </div>
    <div class="form-group">
      <input id="price" placeholder="Price">
    </div>
    <button onclick="createRequest()">Find Courier</button>
    <div class="success-message" id="successMessage">
      Package request submitted successfully! A courier will be assigned soon.
    </div>
    <div class="error-message" id="errorMessage">
      Error submitting request. Please try again.
    </div>
  </div>
  <script src="../js/request.js"></script>
</body>
</html>
